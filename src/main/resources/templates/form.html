<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <title th:text="${action} == '/todos/create' ? #{form.create} : #{form.update}"></title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/css/bootstrap.min.css"
          integrity="sha384-ggOyR0iXCbMQv3Xipma34MD+dH/1fQ784/j6cY/iJTQUOhcWr7x9JvoRxT2MZw1T" crossorigin="anonymous">
</head>
<body>
<div style="margin: 10px 5px">
    <a href="?lang=vi" class="btn btn-sm btn-outline-secondary" th:text="#{lang.vi}"></a>
    <a href="?lang=en" class="btn btn-sm btn-outline-secondary" th:text="#{lang.en}"></a>
</div>
<div class="container" style="margin-top: 20px">
    <h4 th:text="${action} == '/todos/create' ? #{form.create} : #{form.update}"></h4>
    <form th:action="@{|${action}|}" th:object="${todoDTO}" method="post">

        <div class="form-group">
            <label th:text="#{label.content}"></label>
            <input type="text" class="form-control" th:field="*{content}" />
            <span th:if="${#fields.hasErrors('content')}" th:text="${#fields.errors('content')[0]}" class="text-danger"></span>
        </div>

        <div class="form-group">
            <label th:text="#{label.dueDate}"></label>
            <input type="date" class="form-control" th:field="*{dueDate}" />
            <span th:if="${#fields.hasErrors('dueDate')}" th:text="${#fields.errors('dueDate')[0]}" class="text-danger"></span>
        </div>

        <div class="form-group">
            <label th:text="#{label.status}"></label>
            <select class="form-control" th:field="*{status}">
                <option value="false" th:text="#{status.notdone}"></option>
                <option value="true" th:text="#{status.done}"></option>
            </select>
            <span th:if="${#fields.hasErrors('status')}" th:text="${#fields.errors('status')[0]}" class="text-danger"></span>
        </div>

        <div class="form-group">
            <label th:text="#{label.priority}"></label>
            <input type="number" class="form-control" th:field="*{priority}" />
            <span th:if="${#fields.hasErrors('priority')}" th:text="${#fields.errors('priority')[0]}" class="text-danger"></span>
        </div>

        <a th:href="@{/todos}" class="btn btn-secondary" th:text="#{btn.back}"></a>
        <button type="submit" class="btn btn-primary" th:text="${action} == '/todos/create' ? #{btn.create} : #{btn.edit}"></button>

    </form>
</div>

<script src="https://code.jquery.com/jquery-3.3.1.slim.min.js"
        integrity="sha384-q8i/X+965DzO0rT7abK41JStQIAqVgRVzpbzo5smXKp4YfRvH+8abtDE1Pi6jizo"
        crossorigin="anonymous"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/popper.js/1.14.7/umd/popper.min.js"
        integrity="sha384-UO2eT0CpHqdSJQ6hJty5KVphtPhzWj9WO1clHTMGa3JDZwrnQq4sF86dIHNDz0W1"
        crossorigin="anonymous"></script>
<script src="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/js/bootstrap.min.js"
        integrity="sha384-JjSmVgyd0p3pXB1rRibZUAYoIIy6OrQ6VrjIEaFf/nJGzIxFDsf4x0xIM+B07jRM"
        crossorigin="anonymous"></script>
</body>
</html>
